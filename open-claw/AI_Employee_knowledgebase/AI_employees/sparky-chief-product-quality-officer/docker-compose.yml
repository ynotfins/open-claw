version: "3.8"

services:
  agent:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openclaw-sparky-chief-product-quality-officer:/root/.openclaw
    restart: unless-stopped

  heartbeat:
    image: alpine/curl:latest
    env_file:
      - .env
    volumes:
      - ./heartbeat.sh:/heartbeat.sh:ro
    entrypoint: ["sh", "/heartbeat.sh"]
    restart: unless-stopped
    depends_on:
      - agent

volumes:
  openclaw-sparky-chief-product-quality-officer:
